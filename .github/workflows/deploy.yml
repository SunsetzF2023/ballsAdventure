name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Build
      run: |
        # 验证文件结构
        echo "检查项目结构..."
        ls -la
        echo "检查js目录..."
        ls -la js/
        echo "检查assets目录..."
        ls -la assets/
        
        # 创建必要的目录（如果不存在）
        mkdir -p assets/images assets/sounds assets/fonts
        
        # 验证HTML文件
        echo "验证HTML文件..."
        if [ -f "index.html" ]; then
          echo "✓ index.html 存在"
        else
          echo "✗ index.html 不存在"
          exit 1
        fi
        
        # 验证CSS文件
        if [ -f "style.css" ]; then
          echo "✓ style.css 存在"
        else
          echo "✗ style.css 不存在"
          exit 1
        fi
        
        # 验证JS文件
        echo "验证JavaScript文件..."
        js_files=("js/main.js" "js/config.js" "js/utils.js" "js/gameState.js" "js/renderer.js" "js/entities.js" "js/gameLogic.js" "js/ui.js")
        for file in "${js_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file 存在"
          else
            echo "✗ $file 不存在"
            exit 1
          fi
        done

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
